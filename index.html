<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>圣经在线阅读器</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #fff;
            background-image: url('牡丹.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            transition: all 0.3s ease;
        }
        
        /* 深色模式 */
        body.beige {
            background-color: #f5f2e9;
        }
        
        /* 容器 */
        .container {
            max-width: 100%;
            padding: 16px;
            margin: 0 auto;
        }
        
        /* 顶部导航 */
        .header {
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(200, 200, 200, 0.2);
            padding: 12px 16px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        body.beige .header {
            background-color: rgba(245, 242, 233, 0.85);
            border-bottom-color: rgba(224, 217, 200, 0.3);
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .header-buttons {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fff;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn:hover {
            background-color: #f5f5f5;
        }
        
        body.beige .btn {
            background-color: #f5f2e9;
            border-color: #e0d9c8;
        }
        
        /* 章节选择器 */
        .chapter-selector {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(200, 200, 200, 0.2);
            backdrop-filter: blur(5px);
        }
        
        body.beige .chapter-selector {
            background-color: rgba(245, 242, 233, 0.85);
            border-color: rgba(224, 217, 200, 0.3);
        }
        
        .select-group {
            margin-bottom: 12px;
        }
        
        .select-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #555;
        }
        
        .select-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            background-color: #fff;
        }
        
        body.beige .select-group select {
            background-color: #f5f2e9;
            border-color: #e0d9c8;
        }
        
        /* 经文内容 */
        .bible-content {
            margin-bottom: 20px;
            background-color: rgba(255, 255, 255, 0.85);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(200, 200, 200, 0.2);
            backdrop-filter: blur(5px);
        }
        
        body.beige .bible-content {
            background-color: rgba(245, 242, 233, 0.85);
            border-color: rgba(224, 217, 200, 0.3);
        }
        
        .book-chapter {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #333;
            text-align: center;
        }
        
        .verse {
            margin-bottom: 12px;
            padding-left: 30px;
            position: relative;
        }
        
        .verse-number {
            position: absolute;
            left: 0;
            color: #e53935;
            font-size: 14px;
            font-weight: 500;
            min-width: 24px;
            text-align: right;
        }
        
        .verse-text {
            font-size: 16px;
            line-height: 1.7;
        }
        
        /* 字体大小 */
        .font-small .verse-text {
            font-size: 14px;
        }
        
        .font-large .verse-text {
            font-size: 18px;
        }
        
        /* 工具栏 */
        .toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #f8f8f8;
            backdrop-filter: blur(10px);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            z-index: 99;
        }
        
        body.beige .toolbar {
            background-color: #f5f2e9;
        }
        
        .tool-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 16px 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 12px;
            min-height: 48px;
            background: #f8f8f8;
            box-shadow: 5px 5px 10px rgba(163, 177, 198, 0.1),
                        -5px -5px 10px rgba(255, 255, 255, 0.8);
        }
        
        body.beige .tool-btn {
            background: #f5f2e9;
            box-shadow: 5px 5px 10px rgba(163, 177, 198, 0.1),
                        -5px -5px 10px rgba(255, 255, 255, 0.6);
        }
        
        .tool-btn:hover {
            transform: translateY(-2px);
        }
        
        .tool-btn:active {
            box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.2),
                        inset -3px -3px 6px rgba(255, 255, 255, 0.8);
            transform: scale(0.98);
        }
        
        body.beige .tool-btn:active {
            box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.2),
                        inset -3px -3px 6px rgba(255, 255, 255, 0.6);
        }
        
        .tool-btn.active {
            box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.2),
                        inset -3px -3px 6px rgba(255, 255, 255, 0.8);
        }
        
        body.beige .tool-btn.active {
            box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.2),
                        inset -3px -3px 6px rgba(255, 255, 255, 0.6);
        }
        
        .tool-btn span:first-child {
            font-size: 20px;
            color: #555;
            transition: all 0.2s ease;
        }
        
        .tool-btn span:last-child {
            font-size: 12px;
            color: #888;
            font-weight: 400;
            transition: all 0.2s ease;
        }
        
        body.beige .tool-btn span:first-child {
            color: #666;
        }
        
        body.beige .tool-btn span:last-child {
            color: #999;
        }
        
        /* 模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        
        .modal-content {
            background-color: #fff;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }
        
        body.beige .modal-content {
            background-color: #f5f2e9;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .modal-header h2 {
            font-size: 16px;
            font-weight: 600;
        }
        
        .close-btn {
            font-size: 20px;
            cursor: pointer;
            color: #666;
        }
        
        /* 书签列表 */
        .bookmark-list {
            margin-bottom: 20px;
        }
        
        .bookmark-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        body.beige .bookmark-item {
            border-bottom-color: #e0d9c8;
        }
        
        .bookmark-info {
            flex: 1;
        }
        
        .bookmark-location {
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .bookmark-text {
            font-size: 14px;
            color: #666;
            line-height: 1.4;
        }
        
        .bookmark-actions {
            display: flex;
            gap: 8px;
        }
        
        /* 笔记列表 */
        .note-list {
            margin-bottom: 20px;
        }
        
        .note-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            margin-bottom: 12px;
        }
        
        body.beige .note-item {
            border-bottom-color: #e0d9c8;
        }
        
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .note-location {
            font-weight: 500;
        }
        
        .note-date {
            font-size: 12px;
            color: #999;
        }
        
        .note-content {
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        
        .note-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        
        /* 笔记编辑 */
        .note-editor {
            margin-bottom: 16px;
        }
        
        .note-editor textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            resize: vertical;
            min-height: 120px;
        }
        
        body.beige .note-editor textarea {
            background-color: #f5f2e9;
            border-color: #e0d9c8;
        }
        
        .note-editor-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 8px;
        }
        
        /* 阅读设置 */
        .settings-options {
            margin-bottom: 20px;
        }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        
        body.beige .setting-item {
            border-bottom-color: #e0d9c8;
        }
        
        .setting-label {
            font-size: 14px;
        }
        
        .setting-value {
            display: flex;
            gap: 8px;
        }
        
        .setting-btn {
            padding: 4px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .setting-btn.active {
            background-color: #333;
            color: #fff;
            border-color: #333;
        }
        
        body.beige .setting-btn {
            border-color: #e0d9c8;
        }
        
        /* 响应式调整 */
        @media (max-width: 480px) {
            .container {
                padding: 12px;
            }
            
            .header h1 {
                font-size: 16px;
            }
            
            .verse-text {
                font-size: 15px;
            }
        }
        
        /* 动画效果 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <h1 id="current-location">创世纪 1</h1>
        <div class="header-buttons">
            <button class="btn" id="lang-toggle">English</button>
        </div>
    </header>
    
    <div class="container">
        <!-- 章节选择器 -->
        <div class="chapter-selector">
            <div class="select-group">
                <label for="book-select">卷</label>
                <select id="book-select"></select>
            </div>
            <div class="select-group">
                <label for="chapter-select">章</label>
                <select id="chapter-select"></select>
            </div>
        </div>
        
        <!-- 经文内容 -->
        <div class="bible-content" id="bible-content">
            <!-- 经文将通过JavaScript动态生成 -->
        </div>
    </div>
    
    <!-- 底部工具栏 -->
    <div class="toolbar">
        <div class="tool-btn" id="bookmark-btn">
            <span>📑</span>
            <span>书签</span>
        </div>
        <div class="tool-btn" id="note-btn">
            <span>📝</span>
            <span>笔记</span>
        </div>
        <div class="tool-btn" id="settings-btn">
            <span>⚙️</span>
            <span>设置</span>
        </div>
        <div class="tool-btn" id="add-bookmark-btn">
            <span>➕</span>
            <span>收藏</span>
        </div>
    </div>
    
    <!-- 书签模态框 -->
    <div class="modal" id="bookmark-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>我的书签</h2>
                <span class="close-btn" id="close-bookmark-modal">×</span>
            </div>
            <div class="bookmark-list" id="bookmark-list">
                <!-- 书签列表将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>
    
    <!-- 笔记模态框 -->
    <div class="modal" id="note-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>我的笔记</h2>
                <span class="close-btn" id="close-note-modal">×</span>
            </div>
            <div class="note-editor">
                <textarea id="note-content" placeholder="在此添加笔记..."></textarea>
                <div class="note-editor-buttons">
                    <button class="btn" id="cancel-note">取消</button>
                    <button class="btn" id="save-note">保存</button>
                </div>
            </div>
            <div class="note-list" id="note-list">
                <!-- 笔记列表将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>
    
    <!-- 设置模态框 -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>阅读设置</h2>
                <span class="close-btn" id="close-settings-modal">×</span>
            </div>
            <div class="settings-options">
                <div class="setting-item">
                    <span class="setting-label">字体大小</span>
                    <div class="setting-value">
                        <button class="setting-btn" data-size="small">小</button>
                        <button class="setting-btn active" data-size="medium">中</button>
                        <button class="setting-btn" data-size="large">大</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">背景颜色</span>
                    <div class="setting-value">
                        <button class="setting-btn active" data-bg="white">白色</button>
                        <button class="setting-btn" data-bg="beige">米色</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
    
    <script>
        // 圣经数据管理
        let bibleData = {
            zh: {},
            en: {}
        };
        
        // 导航结构 - 仅包含书卷和章节信息，不包含经文内容
        const bibleNav = {
            zh: {
                "创世纪": ["1", "2", "3", "4", "5" /* 其他章节... */],
                "出埃及记": ["1", "2", "3" /* 其他章节... */],
                "利未记": ["1", "2" /* 其他章节... */],
                "民数记": ["1" /* 其他章节... */],
                "申命记": ["1" /* 其他章节... */],
                // 其他旧约书卷...
                "马太福音": ["1", "2" /* 其他章节... */],
                "马可福音": ["1" /* 其他章节... */],
                "路加福音": ["1" /* 其他章节... */],
                "约翰福音": ["1" /* 其他章节... */],
                // 其他新约书卷...
            },
            en: {
                "Genesis": ["1", "2", "3", "4", "5" /* 其他章节... */],
                "Exodus": ["1", "2", "3" /* 其他章节... */],
                "Leviticus": ["1", "2" /* 其他章节... */],
                "Numbers": ["1" /* 其他章节... */],
                "Deuteronomy": ["1" /* 其他章节... */],
                // 其他旧约书卷...
                "Matthew": ["1", "2" /* 其他章节... */],
                "Mark": ["1" /* 其他章节... */],
                "Luke": ["1" /* 其他章节... */],
                "John": ["1" /* 其他章节... */],
                // 其他新约书卷...
            }
        };
        
        // 加载经文数据
        function loadBibleData(book, chapter) {
            // 检查数据是否已加载
            if (bibleData[currentLang][book] && bibleData[currentLang][book][chapter]) {
                return Promise.resolve();
            }
            
            // 这里应该是加载外部JSON文件的逻辑
            // 由于是单文件方案，我们使用内嵌的示例数据
            // 实际使用时，这里可以改为fetch请求外部JSON文件
            return new Promise((resolve) => {
                // 示例数据 - 实际使用时应替换为外部JSON加载
                const sampleData = {
                    zh: {
                        "创世纪": {
                            "1": [
                                "起初，神创造天地。",
                                "地是空虚混沌，渊面黑暗；神的灵运行在水面上。",
                                "神说：「要有光」，就有了光。",
                                "神看光是好的，就把光暗分开了。",
                                "神称光为「昼」，称暗为「夜」。有晚上，有早晨，这是头一日。"
                            ],
                            "2": [
                                "天地万物都造齐了。",
                                "到第七日，神造物的工已经完毕，就在第七日歇了他一切的工，安息了。",
                                "神赐福给第七日，定为圣日，因为在这日神歇了他一切创造的工，就安息了。"
                            ]
                        },
                        "出埃及记": {
                            "1": [
                                "以色列的众子，各带家眷和雅各一同来到埃及，他们的名字记在下面。",
                                "有流便、西缅、利未、犹大、",
                                "以萨迦、西布伦、便雅悯、",
                                "但、拿弗他利、迦得、亚设。"
                            ]
                        }
                    },
                    en: {
                        "Genesis": {
                            "1": [
                                "In the beginning God created the heavens and the earth.",
                                "Now the earth was formless and empty, darkness was over the surface of the deep, and the Spirit of God was hovering over the waters.",
                                "And God said, \"Let there be light,\" and there was light.",
                                "God saw that the light was good, and he separated the light from the darkness.",
                                "God called the light \"day,\" and the darkness he called \"night.\" And there was evening, and there was morning—the first day."
                            ],
                            "2": [
                                "Thus the heavens and the earth were completed in all their vast array.",
                                "By the seventh day God had finished the work he had been doing; so on the seventh day he rested from all his work.",
                                "Then God blessed the seventh day and made it holy, because on it he rested from all the work of creating that he had done."
                            ]
                        },
                        "Exodus": {
                            "1": [
                                "These are the names of the sons of Israel who went to Egypt with Jacob, each with his family:",
                                "Reuben, Simeon, Levi and Judah;",
                                "Issachar, Zebulun and Benjamin;",
                                "Dan and Naphtali; Gad and Asher."
                            ]
                        }
                    }
                };
                
                // 合并示例数据到bibleData
                if (!bibleData[currentLang][book]) {
                    bibleData[currentLang][book] = {};
                }
                
                if (sampleData[currentLang][book] && sampleData[currentLang][book][chapter]) {
                    bibleData[currentLang][book][chapter] = sampleData[currentLang][book][chapter];
                }
                
                resolve();
            });
        }
        
        // 预加载相邻章节
        function preloadAdjacentChapters() {
            const currentBookChapters = bibleNav[currentLang][currentBook];
            const currentChapterIndex = currentBookChapters.indexOf(currentChapter);
            
            // 预加载前一章
            if (currentChapterIndex > 0) {
                const prevChapter = currentBookChapters[currentChapterIndex - 1];
                loadBibleData(currentBook, prevChapter);
            }
            
            // 预加载后一章
            if (currentChapterIndex < currentBookChapters.length - 1) {
                const nextChapter = currentBookChapters[currentChapterIndex + 1];
                loadBibleData(currentBook, nextChapter);
            }
        }
        
        // 全局变量
        let currentLang = 'zh';
        let currentBook = '创世纪';
        let currentChapter = '1';
        let currentFontSize = 'medium';
        let currentBgColor = 'white';
        
        // 初始化函数
        function init() {
            loadSettings();
            populateBookSelect();
            populateChapterSelect();
            displayVerse();
            bindEvents();
        }
        
        // 加载设置
        function loadSettings() {
            const savedLang = localStorage.getItem('bible_lang');
            const savedFontSize = localStorage.getItem('bible_font_size');
            const savedBgColor = localStorage.getItem('bible_bg_color');
            
            if (savedLang) currentLang = savedLang;
            if (savedFontSize) currentFontSize = savedFontSize;
            if (savedBgColor) currentBgColor = savedBgColor;
            
            // 应用设置
            document.body.className = currentFontSize + ' ' + currentBgColor;
            document.querySelectorAll('.setting-btn[data-size]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.size === currentFontSize);
            });
            document.querySelectorAll('.setting-btn[data-bg]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.bg === currentBgColor);
            });
            document.getElementById('lang-toggle').textContent = currentLang === 'zh' ? 'English' : '中文';
        }
        
        // 保存设置
        function saveSettings() {
            localStorage.setItem('bible_lang', currentLang);
            localStorage.setItem('bible_font_size', currentFontSize);
            localStorage.setItem('bible_bg_color', currentBgColor);
        }
        
        // 填充书卷选择
        function populateBookSelect() {
            const bookSelect = document.getElementById('book-select');
            bookSelect.innerHTML = '';
            
            const books = Object.keys(bibleNav[currentLang]);
            books.forEach(book => {
                const option = document.createElement('option');
                option.value = book;
                option.textContent = book;
                option.selected = book === currentBook;
                bookSelect.appendChild(option);
            });
        }
        
        // 填充章节选择
        function populateChapterSelect() {
            const chapterSelect = document.getElementById('chapter-select');
            chapterSelect.innerHTML = '';
            
            const chapters = bibleNav[currentLang][currentBook];
            chapters.forEach(chapter => {
                const option = document.createElement('option');
                option.value = chapter;
                option.textContent = chapter;
                option.selected = chapter === currentChapter;
                chapterSelect.appendChild(option);
            });
        }
        
        // 显示经文 - 按需加载当前章节
        async function displayVerse() {
            const content = document.getElementById('bible-content');
            const location = document.getElementById('current-location');
            
            // 更新位置显示
            location.textContent = `${currentBook} ${currentChapter}`;
            
            // 显示加载状态
            content.innerHTML = '<div style="text-align: center; padding: 20px;">加载中...</div>';
            
            try {
                // 加载经文数据
                await loadBibleData(currentBook, currentChapter);
                
                // 生成经文内容
                const verses = bibleData[currentLang][currentBook][currentChapter];
                content.innerHTML = '';
                
                // 优化渲染性能：使用文档片段
                const fragment = document.createDocumentFragment();
                
                verses.forEach((text, index) => {
                    const verseDiv = document.createElement('div');
                    verseDiv.className = 'verse fade-in';
                    verseDiv.innerHTML = `
                        <span class="verse-number">${index + 1}</span>
                        <span class="verse-text">${text}</span>
                    `;
                    fragment.appendChild(verseDiv);
                });
                
                // 一次性插入所有内容，减少DOM操作
                content.appendChild(fragment);
                
                // 预加载相邻章节
                preloadAdjacentChapters();
            } catch (error) {
                content.innerHTML = '<div style="text-align: center; padding: 20px; color: #e53935;">加载失败，请重试</div>';
                console.error('加载经文失败:', error);
            }
        }
        
        // 绑定事件
        function bindEvents() {
            // 语言切换
            document.getElementById('lang-toggle').addEventListener('click', function() {
                currentLang = currentLang === 'zh' ? 'en' : 'zh';
                this.textContent = currentLang === 'zh' ? 'English' : '中文';
                
                // 保存设置
                saveSettings();
                
                // 更新选择器和内容
                populateBookSelect();
                populateChapterSelect();
                displayVerse();
            });
            
            // 书卷选择
            document.getElementById('book-select').addEventListener('change', async function() {
                currentBook = this.value;
                currentChapter = '1';
                populateChapterSelect();
                await displayVerse();
            });
            
            // 章节选择
            document.getElementById('chapter-select').addEventListener('change', async function() {
                currentChapter = this.value;
                await displayVerse();
            });
            
            // 重置所有按钮状态
            function resetButtonStates() {
                document.querySelectorAll('.tool-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
            }
            
            // 书签按钮
            document.getElementById('bookmark-btn').addEventListener('click', function() {
                resetButtonStates();
                this.classList.add('active');
                showBookmarkModal();
            });
            
            // 笔记按钮
            document.getElementById('note-btn').addEventListener('click', function() {
                resetButtonStates();
                this.classList.add('active');
                showNoteModal();
            });
            
            // 设置按钮
            document.getElementById('settings-btn').addEventListener('click', function() {
                resetButtonStates();
                this.classList.add('active');
                showSettingsModal();
            });
            
            // 添加书签按钮
            document.getElementById('add-bookmark-btn').addEventListener('click', function() {
                addBookmark();
            });
            
            // 关闭模态框
            document.getElementById('close-bookmark-modal').addEventListener('click', function() {
                hideModal('bookmark-modal');
                resetButtonStates();
            });
            
            document.getElementById('close-note-modal').addEventListener('click', function() {
                hideModal('note-modal');
                resetButtonStates();
            });
            
            document.getElementById('close-settings-modal').addEventListener('click', function() {
                hideModal('settings-modal');
                resetButtonStates();
            });
            
            // 笔记保存
            document.getElementById('save-note').addEventListener('click', function() {
                saveNote();
            });
            
            document.getElementById('cancel-note').addEventListener('click', function() {
                document.getElementById('note-content').value = '';
            });
            
            // 字体大小设置
            document.querySelectorAll('.setting-btn[data-size]').forEach(btn => {
                btn.addEventListener('click', function() {
                    currentFontSize = this.dataset.size;
                    document.body.className = currentFontSize + ' ' + currentBgColor;
                    document.querySelectorAll('.setting-btn[data-size]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    saveSettings();
                });
            });
            
            // 背景颜色设置
            document.querySelectorAll('.setting-btn[data-bg]').forEach(btn => {
                btn.addEventListener('click', function() {
                    currentBgColor = this.dataset.bg;
                    document.body.className = currentFontSize + ' ' + currentBgColor;
                    document.querySelectorAll('.setting-btn[data-bg]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    saveSettings();
                });
            });
        }
        
        // 显示模态框
        function showModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.style.display = 'flex';
            
            // 如果是书签模态框，更新书签列表
            if (modalId === 'bookmark-modal') {
                updateBookmarkList();
            }
            
            // 如果是笔记模态框，更新笔记列表
            if (modalId === 'note-modal') {
                updateNoteList();
            }
        }
        
        // 隐藏模态框
        function hideModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
        
        // 添加书签
        function addBookmark() {
            const bookmarks = getBookmarks();
            const bookmark = {
                id: Date.now(),
                book: currentBook,
                chapter: currentChapter,
                lang: currentLang,
                text: bibleData[currentLang][currentBook][currentChapter][0].substring(0, 50) + '...'
            };
            
            bookmarks.push(bookmark);
            localStorage.setItem('bible_bookmarks', JSON.stringify(bookmarks));
            
            // 显示提示
            alert('书签已添加');
        }
        
        // 获取书签
        function getBookmarks() {
            const bookmarks = localStorage.getItem('bible_bookmarks');
            return bookmarks ? JSON.parse(bookmarks) : [];
        }
        
        // 更新书签列表
        function updateBookmarkList() {
            const bookmarkList = document.getElementById('bookmark-list');
            const bookmarks = getBookmarks();
            
            if (bookmarks.length === 0) {
                bookmarkList.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">暂无书签</p>';
                return;
            }
            
            bookmarkList.innerHTML = '';
            bookmarks.forEach(bookmark => {
                const item = document.createElement('div');
                item.className = 'bookmark-item';
                item.innerHTML = `
                    <div class="bookmark-info">
                        <div class="bookmark-location">${bookmark.book} ${bookmark.chapter}</div>
                        <div class="bookmark-text">${bookmark.text}</div>
                    </div>
                    <div class="bookmark-actions">
                        <button class="btn" onclick="goToBookmark(${bookmark.id})">跳转</button>
                        <button class="btn" onclick="deleteBookmark(${bookmark.id})">删除</button>
                    </div>
                `;
                bookmarkList.appendChild(item);
            });
        }
        
        // 跳转到书签
        function goToBookmark(id) {
            const bookmarks = getBookmarks();
            const bookmark = bookmarks.find(b => b.id === id);
            
            if (bookmark) {
                currentLang = bookmark.lang;
                currentBook = bookmark.book;
                currentChapter = bookmark.chapter;
                
                // 更新UI
                document.getElementById('lang-toggle').textContent = currentLang === 'zh' ? 'English' : '中文';
                populateBookSelect();
                populateChapterSelect();
                displayVerse();
                saveSettings();
                hideModal('bookmark-modal');
            }
        }
        
        // 删除书签
        function deleteBookmark(id) {
            if (confirm('确定要删除这个书签吗？')) {
                const bookmarks = getBookmarks();
                const filtered = bookmarks.filter(b => b.id !== id);
                localStorage.setItem('bible_bookmarks', JSON.stringify(filtered));
                updateBookmarkList();
            }
        }
        
        // 保存笔记
        function saveNote() {
            const noteContent = document.getElementById('note-content').value.trim();
            if (!noteContent) {
                alert('请输入笔记内容');
                return;
            }
            
            const notes = getNotes();
            const note = {
                id: Date.now(),
                book: currentBook,
                chapter: currentChapter,
                lang: currentLang,
                content: noteContent,
                date: new Date().toLocaleString()
            };
            
            notes.push(note);
            localStorage.setItem('bible_notes', JSON.stringify(notes));
            
            // 清空输入框
            document.getElementById('note-content').value = '';
            
            // 更新笔记列表
            updateNoteList();
            
            // 显示提示
            alert('笔记已保存');
        }
        
        // 获取笔记
        function getNotes() {
            const notes = localStorage.getItem('bible_notes');
            return notes ? JSON.parse(notes) : [];
        }
        
        // 更新笔记列表
        function updateNoteList() {
            const noteList = document.getElementById('note-list');
            const notes = getNotes();
            
            if (notes.length === 0) {
                noteList.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">暂无笔记</p>';
                return;
            }
            
            // 按时间倒序排列
            notes.sort((a, b) => b.id - a.id);
            
            noteList.innerHTML = '';
            notes.forEach(note => {
                const item = document.createElement('div');
                item.className = 'note-item';
                item.innerHTML = `
                    <div class="note-header">
                        <span class="note-location">${note.book} ${note.chapter}</span>
                        <span class="note-date">${note.date}</span>
                    </div>
                    <div class="note-content">${note.content}</div>
                    <div class="note-actions">
                        <button class="btn" onclick="goToNote(${note.id})">跳转</button>
                        <button class="btn" onclick="deleteNote(${note.id})">删除</button>
                    </div>
                `;
                noteList.appendChild(item);
            });
        }
        
        // 跳转到笔记位置
        function goToNote(id) {
            const notes = getNotes();
            const note = notes.find(n => n.id === id);
            
            if (note) {
                currentLang = note.lang;
                currentBook = note.book;
                currentChapter = note.chapter;
                
                // 更新UI
                document.getElementById('lang-toggle').textContent = currentLang === 'zh' ? 'English' : '中文';
                populateBookSelect();
                populateChapterSelect();
                displayVerse();
                saveSettings();
                hideModal('note-modal');
            }
        }
        
        // 删除笔记
        function deleteNote(id) {
            if (confirm('确定要删除这个笔记吗？')) {
                const notes = getNotes();
                const filtered = notes.filter(n => n.id !== id);
                localStorage.setItem('bible_notes', JSON.stringify(filtered));
                updateNoteList();
            }
        }
        
        // 初始化应用
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
